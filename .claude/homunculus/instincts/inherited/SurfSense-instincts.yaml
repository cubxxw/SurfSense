# SurfSense Workflow Extract Shared Helper Or Contract

## Action

Follow the extract-shared-helper-or-contract workflow:
1. Identify duplicated logic or contract (e.g., permission checks, cookie payload types).
2. Extract logic/type into a new shared file (e.g., atoms, types, or lib/).
3. Update all consumers to use the new shared helper/type.
4. Remove old, duplicated implementations.
5. Fix any orphaned or leftover code from the extraction.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: surfsense_web/atoms/**, surfsense_web/contracts/types/**, surfsense_web/lib/**

